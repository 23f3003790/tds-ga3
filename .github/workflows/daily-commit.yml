name: Daily Auto Commit

on:
  schedule:
    - cron: '30 7 * * *'  # Runs every day at 07:30 UTC
  workflow_dispatch:      # Lets you run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Step with email 23f3003790@ds.study.iitm.ac.in
        run: echo "Workflow triggered"

      - name: Make daily change
        run: |
          echo "Last run: $(date)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add daily-log.txt
          git commit -m "Daily automated commit"
          git push
